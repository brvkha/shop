spring:
  application:
    name: flashcard-backend

  datasource:
    url: ${DB_URL:jdbc:mysql://localhost:3306/khaleo_flashcard}
    username: ${DB_USERNAME:khaleo}
    password: ${DB_PASSWORD:khaleo}
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        type:
          preferred_uuid_jdbc_type: CHAR
        format_sql: true

  flyway:
    enabled: true
    baseline-on-migrate: true
    locations: classpath:db/migration

logging:
  config: classpath:logback-spring.xml

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus

app:
  study:
    next-cards:
      default-page-size: ${STUDY_NEXT_CARDS_DEFAULT_PAGE_SIZE:20}
      max-page-size: ${STUDY_NEXT_CARDS_MAX_PAGE_SIZE:100}
  dynamo:
    region: ${AWS_REGION:us-east-1}
    endpoint: ${DYNAMODB_ENDPOINT:}
    study-activity-log-table: ${STUDY_ACTIVITY_LOG_TABLE:StudyActivityLog}
  media:
    s3:
      bucket: ${MEDIA_S3_BUCKET:khaleo-media}
      key-prefix: ${MEDIA_S3_KEY_PREFIX:uploads}
      region: ${MEDIA_S3_REGION:${AWS_REGION:us-east-1}}
      endpoint: ${MEDIA_S3_ENDPOINT:}
      presigned-url-ttl-seconds: ${MEDIA_PRESIGNED_URL_TTL_SECONDS:300}
      max-size-bytes: ${MEDIA_MAX_SIZE_BYTES:5242880}
    authz:
      requests-per-minute: ${MEDIA_AUTHZ_REQUESTS_PER_MINUTE:30}
      allowed-content-types: ${MEDIA_ALLOWED_CONTENT_TYPES:image/jpeg,image/png,audio/mpeg,audio/webm}
  auth:
    jwt:
      issuer: ${JWT_ISSUER:khaleo}
      access-token-ttl-minutes: ${JWT_ACCESS_TOKEN_TTL_MINUTES:15}
      refresh-token-ttl-days: ${JWT_REFRESH_TOKEN_TTL_DAYS:7}
      secret: ${JWT_SECRET:change-me-dev-secret-change-me-dev-secret}
    lockout:
      max-failed-attempts: ${AUTH_LOCKOUT_MAX_FAILED_ATTEMPTS:5}
      duration-seconds: ${AUTH_LOCKOUT_DURATION_SECONDS:86400}
    email:
      from: ${AUTH_EMAIL_FROM:no-reply@khaleoshop.click}
      verification-base-url: ${AUTH_VERIFICATION_BASE_URL:https://app.khaleoshop.click/verify}
      reset-base-url: ${AUTH_RESET_BASE_URL:https://app.khaleoshop.click/reset-password}
  observability:
    splunk:
      enabled: ${SPLUNK_ENABLED:false}
      hec-url: ${SPLUNK_HEC_URL:http://localhost:8088/services/collector/event}
      hec-token: ${SPLUNK_HEC_TOKEN:disabled-token}
      source: ${SPLUNK_SOURCE:flashcard-backend}
      source-type: ${SPLUNK_SOURCE_TYPE:kha-leo:backend}
      index: ${SPLUNK_INDEX:main}
    newrelic:
      agent-enabled: ${NEW_RELIC_AGENT_ENABLED:false}
      app-name: ${NEW_RELIC_APP_NAME:flashcard-backend}
