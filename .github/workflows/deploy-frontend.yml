name: Deploy Frontend

run-name: >-
  Deploy Frontend (${{ github.event.inputs.artifactSha || github.event.workflow_run.head_sha || github.sha }})

on:
  workflow_run:
    workflows:
      - CI
    types:
      - completed
  workflow_dispatch:
    inputs:
      artifactSha:
        description: Optional commit SHA to redeploy
        required: false

jobs:
  workflow-contract:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate deploy workflow semantics
        run: |
          set -euo pipefail
          grep -q "workflow_run:" .github/workflows/deploy-frontend.yml
          grep -q "aws s3 sync" .github/workflows/deploy-frontend.yml
          grep -q "CreateInvalidation" .github/workflows/deploy-frontend.yml

  deploy:
    needs: workflow-contract
    if: >-
      github.event_name == 'workflow_dispatch' ||
      (github.event_name == 'workflow_run' &&
      github.event.workflow_run.conclusion == 'success' &&
      github.event.workflow_run.head_branch == 'main')
    runs-on: ubuntu-latest
    environment: production
    permissions:
      contents: read
      id-token: write
    env:
      AWS_REGION: ${{ secrets.AWS_REGION }}
      FRONTEND_S3_BUCKET: ${{ secrets.FRONTEND_S3_BUCKET }}
      CLOUDFRONT_DISTRIBUTION_ID: ${{ secrets.CLOUDFRONT_DISTRIBUTION_ID }}
      AWS_ROLE_TO_ASSUME: ${{ secrets.AWS_ROLE_TO_ASSUME }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.artifactSha || github.event.workflow_run.head_sha || github.sha }}

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ vars.NODE_VERSION || '20' }}
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: frontend
        run: npm ci

      - name: Build frontend
        working-directory: frontend
        env:
          VITE_API_BASE_URL: ${{ vars.BACKEND_BASE_URL }}
          VITE_APP_ENV: ${{ vars.APP_ENV || 'production' }}
        run: npm run build

      - name: Validate OIDC deployment contract
        shell: bash
        run: |
          set -euo pipefail
          test -n "${AWS_ROLE_TO_ASSUME}"
          test -n "${AWS_REGION}"
          test -n "${FRONTEND_S3_BUCKET}"

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ env.AWS_ROLE_TO_ASSUME }}
          role-session-name: gha-khaleo-frontend-deploy
          aws-region: ${{ env.AWS_REGION }}

      - name: Upload static assets to S3
        id: sync
        run: |
          set -euo pipefail
          aws s3 sync frontend/dist "s3://${FRONTEND_S3_BUCKET}" --delete

      - name: Invalidate CloudFront cache
        id: invalidate
        run: |
          set -euo pipefail
          INVALIDATION_ID=$(aws cloudfront create-invalidation \
            --distribution-id "${CLOUDFRONT_DISTRIBUTION_ID}" \
            --paths "/*" \
            --query "Invalidation.Id" \
            --output text)
          echo "invalidation_id=${INVALIDATION_ID}" >> "$GITHUB_OUTPUT"

      - name: Publish deployment summary
        if: success()
        run: |
          {
            echo "### Frontend Deployment Summary"
            echo "- Commit: ${{ github.event.inputs.artifactSha || github.event.workflow_run.head_sha || github.sha }}"
            echo "- Bucket: ${FRONTEND_S3_BUCKET}"
            echo "- CloudFront Distribution: ${CLOUDFRONT_DISTRIBUTION_ID}"
            echo "- Invalidation ID: ${{ steps.invalidate.outputs.invalidation_id }}"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Publish failure diagnostics
        if: failure()
        run: |
          {
            echo "### Frontend Deployment Failure"
            echo "- Commit: ${{ github.event.inputs.artifactSha || github.event.workflow_run.head_sha || github.sha }}"
            echo "- Bucket: ${FRONTEND_S3_BUCKET}"
            echo "- CloudFront Distribution: ${CLOUDFRONT_DISTRIBUTION_ID}"
            echo "- Check S3 sync permissions and CloudFront invalidation permissions for AWS_ROLE_TO_ASSUME."
            echo "- Manual rollback: rerun workflow_dispatch with a known-good artifactSha."
          } >> "$GITHUB_STEP_SUMMARY"
