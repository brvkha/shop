name: CI

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main
  workflow_dispatch:

env:
  JAVA_VERSION: ${{ vars.JAVA_VERSION || '17' }}
  NODE_VERSION: ${{ vars.NODE_VERSION || '20' }}
  APP_ENV: ${{ vars.APP_ENV || 'production' }}
  BACKEND_BASE_URL: ${{ vars.BACKEND_BASE_URL || '' }}

jobs:
  workflow-smoke-contract:
    name: Workflow Contract Smoke Assertions
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Assert backend and frontend deploy gating contracts
        shell: bash
        run: |
          set -euo pipefail
          grep -q "environment: production" .github/workflows/deploy-backend.yml
          grep -q "github.event.workflow_run.head_branch == 'main'" .github/workflows/deploy-backend.yml
          grep -q "failed_targets" .github/workflows/deploy-backend.yml
          grep -q "workflow_dispatch" .github/workflows/deploy-backend.yml

          grep -q "environment: production" .github/workflows/deploy-frontend.yml
          grep -q "github.event.workflow_run.head_branch == 'main'" .github/workflows/deploy-frontend.yml
          grep -q "create-invalidation" .github/workflows/deploy-frontend.yml
          grep -q "workflow_dispatch" .github/workflows/deploy-frontend.yml

      - name: Fail on long-lived AWS credential usage
        shell: bash
        run: |
          set -euo pipefail
          if grep -nE "AWS_ACCESS_KEY_ID|AWS_SECRET_ACCESS_KEY" .github/workflows/deploy-backend.yml .github/workflows/deploy-frontend.yml; then
            echo "Long-lived AWS credentials are forbidden in deployment workflows." >&2
            exit 1
          fi

  terraform:
    name: Terraform Validate and Plan
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: infra/terraform
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Terraform format check
        run: terraform fmt -check -recursive

      - name: Terraform init (no backend)
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: terraform init -backend=false

      - name: Terraform validate
        run: terraform validate

      - name: Terraform plan (speculative)
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          terraform plan \
            -refresh=false \
            -lock=false \
            -input=false \
            -var="github_owner=${{ github.repository_owner }}" \
            -var="github_repository=${{ github.event.repository.name }}" \
            -var="artifact_bucket=ci-${{ github.event.repository.name }}-artifacts" \
            -var="frontend_bucket=ci-${{ github.event.repository.name }}-frontend"

  backend:
    name: Backend Test and Build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: ${{ env.JAVA_VERSION }}
          cache: maven

      - name: Validate CI environment contract
        run: |
          set -euo pipefail
          test -n "${JAVA_VERSION}"
          test -n "${APP_ENV}"

      - name: Run backend quality gate (tests)
        run: mvn -B test

      - name: Build backend artifact
        run: mvn -B -DskipTests package

  frontend:
    name: Frontend Lint and Build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Validate CI environment contract
        run: |
          set -euo pipefail
          test -n "${NODE_VERSION}"
          test -n "${APP_ENV}"

      - name: Install dependencies
        run: npm ci

      - name: Lint frontend
        run: npm run lint

      - name: Run frontend tests with coverage
        run: npm run test:coverage

      - name: Build frontend
        env:
          VITE_APP_ENV: ${{ env.APP_ENV }}
          VITE_API_BASE_URL: ${{ env.BACKEND_BASE_URL }}
        run: npm run build

      - name: Publish coverage summary
        if: success()
        run: |
          {
            echo "### Frontend Coverage"
            echo "- Coverage report generated by vitest (--coverage)."
          } >> "$GITHUB_STEP_SUMMARY"

  ci-summary:
    name: CI Summary
    runs-on: ubuntu-latest
    needs:
      - workflow-smoke-contract
      - terraform
      - backend
      - frontend
    if: always()
    steps:
      - name: Report summary
        run: |
          {
            echo "### CI Results"
            echo "- Workflow smoke contract: ${{ needs.workflow-smoke-contract.result }}"
            echo "- Terraform job: ${{ needs.terraform.result }}"
            echo "- Backend job: ${{ needs.backend.result }}"
            echo "- Frontend job: ${{ needs.frontend.result }}"
            echo "- Java version: ${JAVA_VERSION}"
            echo "- Node version: ${NODE_VERSION}"
            echo "- App env: ${APP_ENV}"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Fail if any required job failed
        if: needs.workflow-smoke-contract.result != 'success' || needs.terraform.result != 'success' || needs.backend.result != 'success' || needs.frontend.result != 'success'
        run: exit 1
