name: CI

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main
  workflow_dispatch:

env:
  JAVA_VERSION: ${{ vars.JAVA_VERSION || '17' }}
  NODE_VERSION: ${{ vars.NODE_VERSION || '20' }}
  APP_ENV: ${{ vars.APP_ENV || 'production' }}
  BACKEND_BASE_URL: ${{ vars.BACKEND_BASE_URL || '' }}

jobs:
  backend:
    name: Backend Test and Build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: ${{ env.JAVA_VERSION }}
          cache: maven

      - name: Validate CI environment contract
        run: |
          set -euo pipefail
          test -n "${JAVA_VERSION}"
          test -n "${APP_ENV}"

      - name: Run backend quality gate (tests)
        run: mvn -B test

      - name: Build backend artifact
        run: mvn -B -DskipTests package

  frontend:
    name: Frontend Lint and Build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Validate CI environment contract
        run: |
          set -euo pipefail
          test -n "${NODE_VERSION}"
          test -n "${APP_ENV}"

      - name: Install dependencies
        run: npm ci

      - name: Lint frontend
        run: npm run lint

      - name: Build frontend
        env:
          VITE_APP_ENV: ${{ env.APP_ENV }}
          VITE_API_BASE_URL: ${{ env.BACKEND_BASE_URL }}
        run: npm run build

  ci-summary:
    name: CI Summary
    runs-on: ubuntu-latest
    needs:
      - backend
      - frontend
    if: always()
    steps:
      - name: Report summary
        run: |
          {
            echo "### CI Results"
            echo "- Backend job: ${{ needs.backend.result }}"
            echo "- Frontend job: ${{ needs.frontend.result }}"
            echo "- Java version: ${JAVA_VERSION}"
            echo "- Node version: ${NODE_VERSION}"
            echo "- App env: ${APP_ENV}"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Fail if any required job failed
        if: needs.backend.result != 'success' || needs.frontend.result != 'success'
        run: exit 1
