name: Deploy Backend

run-name: >-
  Deploy Backend (${{ github.event.inputs.artifactSha || github.sha }})

on:
  workflow_dispatch:
    inputs:
      artifactSha:
        description: "Commit SHA to redeploy (leave empty to deploy current SHA)"
        required: false

jobs:
  workflow-contract:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate deploy workflow semantics
        run: |
          set -euo pipefail
          grep -q "workflow_dispatch:" .github/workflows/deploy-backend.yml
          grep -q "aws ssm send-command" .github/workflows/deploy-backend.yml
          grep -q "failed_targets" .github/workflows/deploy-backend.yml

  deploy:
    needs: workflow-contract
    if: github.event_name == 'workflow_dispatch' && github.ref_name == 'main'
    runs-on: ubuntu-latest
    environment: production
    permissions:
      contents: read
      id-token: write
    env:
      AWS_REGION: ${{ secrets.AWS_REGION }}
      ARTIFACT_BUCKET: ${{ secrets.ARTIFACT_BUCKET }}
      DEPLOY_TARGET_TAG_KEY: ${{ secrets.DEPLOY_TARGET_TAG_KEY }}
      DEPLOY_TARGET_TAG_VALUE: ${{ secrets.DEPLOY_TARGET_TAG_VALUE }}
      DEPLOY_TARGET_GROUP_NAME: khaleo-backend-tg
      SERVICE_NAME: ${{ secrets.DEPLOY_SERVICE_NAME }}
      AWS_ROLE_TO_ASSUME: ${{ secrets.AWS_ROLE_TO_ASSUME }}
      DB_SECRET_ID: ${{ vars.DB_SECRET_ID }}
      JWT_SECRET_ID: ${{ vars.JWT_SECRET_ID }}
      SES_SECRET_ID: ${{ vars.SES_SECRET_ID }}
      RUNTIME_ENV_PATH: ${{ vars.RUNTIME_ENV_PATH }}
      TARGET_JAR_PATH: /opt/khaleo/flashcard-backend/current.jar
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.artifactSha || github.sha }}

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: maven

      - name: Build backend artifact
        working-directory: backend
        run: mvn -B clean package -DskipTests

      - name: Resolve deployment SHA
        id: sha
        shell: bash
        run: |
          set -euo pipefail
          SHA="${{ github.event.inputs.artifactSha || github.sha }}"
          echo "value=${SHA}" >> "$GITHUB_OUTPUT"
          echo "Using deployment SHA: ${SHA}"

      - name: Validate OIDC deployment contract
        shell: bash
        run: |
          set -euo pipefail
          test -n "${AWS_ROLE_TO_ASSUME}"
          test -n "${AWS_REGION}"
          test -n "${DB_SECRET_ID}"
          test -n "${JWT_SECRET_ID}"
          test -n "${SES_SECRET_ID}"
          test -n "${RUNTIME_ENV_PATH}"

      - name: Encode deploy script for SSM execution
        id: deploy_script
        shell: bash
        run: |
          set -euo pipefail
          SCRIPT_B64=$(base64 -w 0 backend/scripts/deploy-via-ssm.sh)
          echo "content=${SCRIPT_B64}" >> "$GITHUB_OUTPUT"

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ env.AWS_ROLE_TO_ASSUME }}
          role-session-name: gha-khaleo-backend-deploy
          aws-region: ${{ env.AWS_REGION }}

      - name: Fail fast if DB secret resolves to localhost
        shell: bash
        run: |
          set -euo pipefail
          SECRET_JSON=$(aws secretsmanager get-secret-value \
            --secret-id "${DB_SECRET_ID}" \
            --query SecretString \
            --output text)

          DB_URL=$(jq -r '(.jdbc_url // .jdbcUrl // .url // (if ((.host // .hostname // .endpoint) and (.dbname // .dbName // .database // .database_name)) then "jdbc:mysql://\(.host // .hostname // .endpoint):\((.port // 3306)|tostring)/\(.dbname // .dbName // .database // .database_name)?useSSL=true&requireSSL=true&verifyServerCertificate=true" else "" end))' <<< "$SECRET_JSON")

          if [[ -z "${DB_URL}" ]]; then
            echo "DB secret did not resolve to a JDBC URL." >&2
            exit 1
          fi

          if [[ "${DB_URL}" == *"localhost"* || "${DB_URL}" == *"127.0.0.1"* ]]; then
            echo "DB_URL points to localhost. Refusing to deploy." >&2
            exit 1
          fi

          echo "Validated DB_URL from secret: ${DB_URL}"

      - name: Upload immutable artifact to S3
        id: upload
        shell: bash
        run: |
          set -euo pipefail
          ARTIFACT_KEY="backend/${{ steps.sha.outputs.value }}/app.jar"
          aws s3 cp "backend/target/flashcard-backend-0.1.0-SNAPSHOT.jar" "s3://${ARTIFACT_BUCKET}/${ARTIFACT_KEY}"
          echo "artifact_key=${ARTIFACT_KEY}" >> "$GITHUB_OUTPUT"
          echo "artifact_uri=s3://${ARTIFACT_BUCKET}/${ARTIFACT_KEY}" >> "$GITHUB_OUTPUT"

      - name: Resolve deployment targets from target group
        id: targets
        shell: bash
        run: |
          set -euo pipefail
          TARGET_GROUP_NAME="${DEPLOY_TARGET_GROUP_NAME:-khaleo-backend-tg}"

          TG_ARN=$(aws elbv2 describe-target-groups \
            --names "${TARGET_GROUP_NAME}" \
            --query "TargetGroups[0].TargetGroupArn" \
            --output text)

          if [[ -z "${TG_ARN}" || "${TG_ARN}" == "None" ]]; then
            echo "Unable to resolve target group ARN for ${TARGET_GROUP_NAME}." >&2
            exit 1
          fi

          INSTANCE_IDS=$(aws elbv2 describe-target-health \
            --target-group-arn "${TG_ARN}" \
            --query "TargetHealthDescriptions[].Target.Id" \
            --output text)

          if [[ -z "${INSTANCE_IDS}" ]]; then
            echo "No instances found in target group ${TARGET_GROUP_NAME}." >&2
            exit 1
          fi

          echo "target_group_name=${TARGET_GROUP_NAME}" >> "$GITHUB_OUTPUT"
          echo "target_group_arn=${TG_ARN}" >> "$GITHUB_OUTPUT"
          echo "instance_ids=${INSTANCE_IDS}" >> "$GITHUB_OUTPUT"
          echo "Resolved target group ${TARGET_GROUP_NAME} instances: ${INSTANCE_IDS}"

      - name: Dispatch deployment command to all targets
        id: dispatch
        shell: bash
        run: |
          set -euo pipefail
          PARAMS=$(jq -n \
            --arg script "${{ steps.deploy_script.outputs.content }}" \
            --arg db "${DB_SECRET_ID}" \
            --arg jwt "${JWT_SECRET_ID}" \
            --arg ses "${SES_SECRET_ID}" \
            --arg env_path "${RUNTIME_ENV_PATH}" \
            --arg artifact "${{ steps.upload.outputs.artifact_uri }}" \
            --arg service "${SERVICE_NAME}" \
            --arg jar "${TARGET_JAR_PATH}" \
            '{
              commands: [
                "echo \($script) | base64 -d | sudo tee /tmp/deploy-via-ssm.sh >/dev/null",
                "sudo chmod +x /tmp/deploy-via-ssm.sh",
                "sudo sed -i 's/\\r$//' /tmp/deploy-via-ssm.sh",
                "sudo DB_SECRET_ID=\($db) JWT_SECRET_ID=\($jwt) SES_SECRET_ID=\($ses) RUNTIME_ENV_PATH=\($env_path) /tmp/deploy-via-ssm.sh \($artifact) \($service) \($jar)"
              ]
            }')

          COMMAND_ID=$(aws ssm send-command \
            --document-name "AWS-RunShellScript" \
            --comment "KhaLeo backend deploy ${{ steps.sha.outputs.value }}" \
            --instance-ids ${{ steps.targets.outputs.instance_ids }} \
            --parameters "$PARAMS" \
            --query "Command.CommandId" \
            --output text)
          echo "command_id=${COMMAND_ID}" >> "$GITHUB_OUTPUT"
          echo "Dispatched SSM command: ${COMMAND_ID}"

      - name: Poll per-target results and fail on any failed target
        id: aggregate
        shell: bash
        run: |
          set -euo pipefail
          COMMAND_ID="${{ steps.dispatch.outputs.command_id }}"
          ATTEMPTS=0
          MAX_ATTEMPTS=30
          SLEEP_SECONDS=10

          while [[ ${ATTEMPTS} -lt ${MAX_ATTEMPTS} ]]; do
            INCOMPLETE=$(aws ssm list-command-invocations --command-id "${COMMAND_ID}" --details --query "length(CommandInvocations[?Status!='Success' && Status!='Failed' && Status!='TimedOut' && Status!='Cancelled'])" --output text)
            if [[ "${INCOMPLETE}" == "0" ]]; then
              break
            fi
            ATTEMPTS=$((ATTEMPTS + 1))
            sleep "${SLEEP_SECONDS}"
          done

          STATUS_TABLE=$(aws ssm list-command-invocations --command-id "${COMMAND_ID}" --details --query "CommandInvocations[].{instance:InstanceId,status:Status,details:StatusDetails}" --output table)
          echo "${STATUS_TABLE}"

          FAILED_TARGETS=$(aws ssm list-command-invocations --command-id "${COMMAND_ID}" --details --query "length(CommandInvocations[?Status=='Failed' || Status=='TimedOut' || Status=='Cancelled'])" --output text)
          TOTAL_TARGETS=$(aws ssm list-command-invocations --command-id "${COMMAND_ID}" --details --query "length(CommandInvocations)" --output text)
          FAILED_INSTANCE_IDS=$(aws ssm list-command-invocations --command-id "${COMMAND_ID}" --details --query "CommandInvocations[?Status=='Failed' || Status=='TimedOut' || Status=='Cancelled'].InstanceId" --output text)

          {
            echo "### Deployment Summary"
            echo "- Artifact SHA: ${{ steps.sha.outputs.value }}"
            echo "- Artifact URI: ${{ steps.upload.outputs.artifact_uri }}"
            echo "- SSM Command ID: ${COMMAND_ID}"
            echo "- Target group: ${{ steps.targets.outputs.target_group_name }}"
            echo "- Target group ARN: ${{ steps.targets.outputs.target_group_arn }}"
            echo "- Target instances: ${{ steps.targets.outputs.instance_ids }}"
            echo "- Total targets: ${TOTAL_TARGETS}"
            echo "- Failed targets: ${FAILED_TARGETS}"
            echo "- Environment: production"
            echo ""
            echo "\`\`\`"
            echo "${STATUS_TABLE}"
            echo "\`\`\`"
            echo ""
            echo "### Rollback Guidance"
            echo "- Re-run this workflow via workflow_dispatch with artifactSha=<known-good-sha>."
            echo "- Re-run Deploy Frontend with the same artifactSha to keep versions aligned."
          } >> "$GITHUB_STEP_SUMMARY"

          echo "failed_targets=${FAILED_TARGETS}" >> "$GITHUB_OUTPUT"
          if [[ "${FAILED_TARGETS}" != "0" ]]; then
            echo "Collecting failed target diagnostics..."
            for INSTANCE_ID in ${FAILED_INSTANCE_IDS}; do
              echo "----- ${INSTANCE_ID} STDERR -----"
              aws ssm get-command-invocation \
                --command-id "${COMMAND_ID}" \
                --instance-id "${INSTANCE_ID}" \
                --query "StandardErrorContent" \
                --output text || true

              echo "----- ${INSTANCE_ID} STDOUT -----"
              aws ssm get-command-invocation \
                --command-id "${COMMAND_ID}" \
                --instance-id "${INSTANCE_ID}" \
                --query "StandardOutputContent" \
                --output text || true
            done

            echo "One or more deployment targets failed."
            exit 1
          fi

      - name: Deploy to newly registered target-group instances
        id: deploy_additional_targets
        shell: bash
        run: |
          set -euo pipefail
          TG_ARN="${{ steps.targets.outputs.target_group_arn }}"
          INITIAL_INSTANCE_IDS="${{ steps.targets.outputs.instance_ids }}"

          mapfile -t INITIAL_ARR < <(tr '\t' '\n' <<< "${INITIAL_INSTANCE_IDS}" | sed '/^$/d')

          CURRENT_INSTANCE_IDS=$(aws elbv2 describe-target-health \
            --target-group-arn "${TG_ARN}" \
            --query "TargetHealthDescriptions[].Target.Id" \
            --output text)

          contains_initial() {
            local candidate="$1"
            for existing in "${INITIAL_ARR[@]}"; do
              if [[ "${existing}" == "${candidate}" ]]; then
                return 0
              fi
            done
            return 1
          }

          ADDITIONAL_INSTANCE_IDS=""
          for INSTANCE_ID in ${CURRENT_INSTANCE_IDS}; do
            if ! contains_initial "${INSTANCE_ID}"; then
              ADDITIONAL_INSTANCE_IDS+=" ${INSTANCE_ID}"
            fi
          done
          ADDITIONAL_INSTANCE_IDS="$(xargs <<< "${ADDITIONAL_INSTANCE_IDS}")"

          if [[ -z "${ADDITIONAL_INSTANCE_IDS}" ]]; then
            echo "No new target-group instances detected after primary deploy."
            echo "additional_instance_ids=" >> "$GITHUB_OUTPUT"
            echo "all_instance_ids=${INITIAL_INSTANCE_IDS}" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          echo "Detected new target-group instances requiring deploy: ${ADDITIONAL_INSTANCE_IDS}"

          PARAMS=$(jq -n \
            --arg script "${{ steps.deploy_script.outputs.content }}" \
            --arg db "${DB_SECRET_ID}" \
            --arg jwt "${JWT_SECRET_ID}" \
            --arg ses "${SES_SECRET_ID}" \
            --arg env_path "${RUNTIME_ENV_PATH}" \
            --arg artifact "${{ steps.upload.outputs.artifact_uri }}" \
            --arg service "${SERVICE_NAME}" \
            --arg jar "${TARGET_JAR_PATH}" \
            '{
              commands: [
                "echo \($script) | base64 -d | sudo tee /tmp/deploy-via-ssm.sh >/dev/null",
                "sudo chmod +x /tmp/deploy-via-ssm.sh",
                "sudo sed -i '\''s/\\r$//'\'' /tmp/deploy-via-ssm.sh",
                "sudo DB_SECRET_ID=\($db) JWT_SECRET_ID=\($jwt) SES_SECRET_ID=\($ses) RUNTIME_ENV_PATH=\($env_path) /tmp/deploy-via-ssm.sh \($artifact) \($service) \($jar)"
              ]
            }')

          ADDITIONAL_COMMAND_ID=$(aws ssm send-command \
            --document-name "AWS-RunShellScript" \
            --comment "KhaLeo backend deploy additional targets ${{ steps.sha.outputs.value }}" \
            --instance-ids ${ADDITIONAL_INSTANCE_IDS} \
            --parameters "${PARAMS}" \
            --query "Command.CommandId" \
            --output text)

          ATTEMPTS=0
          MAX_ATTEMPTS=30
          SLEEP_SECONDS=10
          while [[ ${ATTEMPTS} -lt ${MAX_ATTEMPTS} ]]; do
            INCOMPLETE=$(aws ssm list-command-invocations --command-id "${ADDITIONAL_COMMAND_ID}" --details --query "length(CommandInvocations[?Status!='Success' && Status!='Failed' && Status!='TimedOut' && Status!='Cancelled'])" --output text)
            if [[ "${INCOMPLETE}" == "0" ]]; then
              break
            fi
            ATTEMPTS=$((ATTEMPTS + 1))
            sleep "${SLEEP_SECONDS}"
          done

          ADDITIONAL_FAILED=$(aws ssm list-command-invocations --command-id "${ADDITIONAL_COMMAND_ID}" --details --query "length(CommandInvocations[?Status=='Failed' || Status=='TimedOut' || Status=='Cancelled'])" --output text)

          {
            echo "### Additional Target Deploy"
            echo "- Command ID: ${ADDITIONAL_COMMAND_ID}"
            echo "- Additional instances: ${ADDITIONAL_INSTANCE_IDS}"
            echo "- Failed additional targets: ${ADDITIONAL_FAILED}"
          } >> "$GITHUB_STEP_SUMMARY"

          if [[ "${ADDITIONAL_FAILED}" != "0" ]]; then
            echo "Additional target deployment failed." >&2
            exit 1
          fi

          echo "additional_instance_ids=${ADDITIONAL_INSTANCE_IDS}" >> "$GITHUB_OUTPUT"
          echo "all_instance_ids=${INITIAL_INSTANCE_IDS} ${ADDITIONAL_INSTANCE_IDS}" >> "$GITHUB_OUTPUT"

      - name: Verify target group health convergence
        id: tg_health
        shell: bash
        run: |
          set -euo pipefail
          TG_ARN="${{ steps.targets.outputs.target_group_arn }}"
          DEPLOYED_INSTANCE_IDS="${{ steps.deploy_additional_targets.outputs.all_instance_ids }}"
          ATTEMPTS=0
          MAX_ATTEMPTS=24
          SLEEP_SECONDS=10

          check_non_healthy() {
            local non_healthy=0
            for INSTANCE_ID in ${DEPLOYED_INSTANCE_IDS}; do
              STATE=$(aws elbv2 describe-target-health \
                --target-group-arn "${TG_ARN}" \
                --targets "Id=${INSTANCE_ID}" \
                --query "TargetHealthDescriptions[0].TargetHealth.State" \
                --output text 2>/dev/null || echo "unknown")

              if [[ "${STATE}" != "healthy" ]]; then
                non_healthy=$((non_healthy + 1))
              fi
            done
            echo "${non_healthy}"
          }

          while [[ ${ATTEMPTS} -lt ${MAX_ATTEMPTS} ]]; do
            UNHEALTHY_COUNT=$(check_non_healthy)

            if [[ "${UNHEALTHY_COUNT}" == "0" ]]; then
              break
            fi

            ATTEMPTS=$((ATTEMPTS + 1))
            sleep "${SLEEP_SECONDS}"
          done

          TG_STATUS_TABLE=$(aws elbv2 describe-target-health \
            --target-group-arn "${TG_ARN}" \
            --query "TargetHealthDescriptions[].{instance:Target.Id,state:TargetHealth.State,reason:TargetHealth.Reason}" \
            --output table)

          echo "${TG_STATUS_TABLE}"

          FINAL_UNHEALTHY_COUNT=$(check_non_healthy)

          {
            echo "### Target Group Health"
            echo "- Target group: ${{ steps.targets.outputs.target_group_name }}"
            echo "- Target group ARN: ${TG_ARN}"
            echo "- Deployed instances: ${DEPLOYED_INSTANCE_IDS}"
            echo "- Non-healthy targets: ${FINAL_UNHEALTHY_COUNT}"
            echo ""
            echo "\`\`\`"
            echo "${TG_STATUS_TABLE}"
            echo "\`\`\`"
          } >> "$GITHUB_STEP_SUMMARY"

          if [[ "${FINAL_UNHEALTHY_COUNT}" != "0" ]]; then
            echo "Target group did not converge to healthy after deployment." >&2
            exit 1
          fi

      - name: Manual rollback reminder
        if: failure()
        run: |
          {
            echo "### Manual Rollback"
            echo "- Re-run this workflow via workflow_dispatch with artifactSha=<known-good-sha>."
            echo "- Re-run Deploy Frontend with the same artifactSha for consistency."
          } >> "$GITHUB_STEP_SUMMARY"
