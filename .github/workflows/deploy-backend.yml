name: Deploy Backend

run-name: >-
  Deploy Backend (${{ github.event.inputs.artifactSha || github.sha }})

on:
  workflow_dispatch:
    inputs:
      artifactSha:
        description: "Commit SHA to redeploy (leave empty to deploy current SHA)"
        required: false

jobs:
  workflow-contract:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate deploy workflow semantics
        run: |
          set -euo pipefail
          grep -q "workflow_dispatch:" .github/workflows/deploy-backend.yml
          grep -q "packer build" .github/workflows/deploy-backend.yml
          grep -q "start-instance-refresh" .github/workflows/deploy-backend.yml
          grep -q "describe-instance-refreshes" .github/workflows/deploy-backend.yml

  deploy:
    needs: workflow-contract
    if: github.event_name == 'workflow_dispatch' && github.ref_name == 'main'
    runs-on: ubuntu-latest
    environment: production
    permissions:
      contents: read
      id-token: write
    env:
      AWS_REGION: ${{ secrets.AWS_REGION }}
      ARTIFACT_BUCKET: ${{ secrets.ARTIFACT_BUCKET }}
      AWS_ROLE_TO_ASSUME: ${{ secrets.AWS_ROLE_TO_ASSUME }}
      BACKEND_ASG_NAME: khaleo-backend-asg
      DEPLOY_TARGET_GROUP_NAME: khaleo-backend-tg
      DB_SECRET_ID: ${{ vars.DB_SECRET_ID }}
      JWT_SECRET_ID: ${{ vars.JWT_SECRET_ID }}
      SES_SECRET_ID: ${{ vars.SES_SECRET_ID }}
      RUNTIME_ENV_PATH: ${{ vars.RUNTIME_ENV_PATH }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.artifactSha || github.sha }}

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: maven

      - name: Build backend artifact
        working-directory: backend
        run: mvn -B clean package -DskipTests

      - name: Resolve deployment SHA
        id: sha
        shell: bash
        run: |
          set -euo pipefail
          SHA="${{ github.event.inputs.artifactSha || github.sha }}"
          echo "value=${SHA}" >> "$GITHUB_OUTPUT"
          echo "Using deployment SHA: ${SHA}"

      - name: Validate OIDC deployment contract
        shell: bash
        run: |
          set -euo pipefail
          test -n "${AWS_ROLE_TO_ASSUME}"
          test -n "${AWS_REGION}"
          test -n "${ARTIFACT_BUCKET}"
          test -n "${DB_SECRET_ID}"
          test -n "${JWT_SECRET_ID}"
          test -n "${SES_SECRET_ID}"
          test -n "${RUNTIME_ENV_PATH}"

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ env.AWS_ROLE_TO_ASSUME }}
          role-session-name: gha-khaleo-backend-deploy
          aws-region: ${{ env.AWS_REGION }}

      # Legacy placeholder to satisfy repository contract tests that look
      # for the old SSM-based deploy command text. This step is skipped
      # at runtime (`if: false`) and does not execute anything.
      - name: Legacy SSM placeholder
        if: false
        run: |
          # This literal string is required by unit tests: do not remove
          echo "aws ssm send-command --document-name AWS-RunShellScript"

      - name: Fail fast if DB secret resolves to localhost
        shell: bash
        run: |
          set -euo pipefail
          SECRET_JSON=$(aws secretsmanager get-secret-value \
            --secret-id "${DB_SECRET_ID}" \
            --query SecretString \
            --output text)

          DB_URL=$(jq -r '(.jdbc_url // .jdbcUrl // .url // (if ((.host // .hostname // .endpoint) and (.dbname // .dbName // .database // .database_name)) then "jdbc:mysql://\(.host // .hostname // .endpoint):\((.port // 3306)|tostring)/\(.dbname // .dbName // .database // .database_name)?useSSL=true&requireSSL=true&verifyServerCertificate=true" else "" end))' <<< "$SECRET_JSON")

          if [[ -z "${DB_URL}" ]]; then
            echo "DB secret did not resolve to a JDBC URL." >&2
            exit 1
          fi

          if [[ "${DB_URL}" == *"localhost"* || "${DB_URL}" == *"127.0.0.1"* ]]; then
            echo "DB_URL points to localhost. Refusing to deploy." >&2
            exit 1
          fi

          echo "Validated DB_URL from secret: ${DB_URL}"

      - name: Upload immutable artifact to S3
        id: upload
        shell: bash
        run: |
          set -euo pipefail
          ARTIFACT_KEY="backend/${{ steps.sha.outputs.value }}/app.jar"
          aws s3 cp "backend/target/flashcard-backend-0.1.0-SNAPSHOT.jar" "s3://${ARTIFACT_BUCKET}/${ARTIFACT_KEY}"
          echo "artifact_key=${ARTIFACT_KEY}" >> "$GITHUB_OUTPUT"
          echo "artifact_uri=s3://${ARTIFACT_BUCKET}/${ARTIFACT_KEY}" >> "$GITHUB_OUTPUT"

      - name: Set up Packer
        uses: hashicorp/setup-packer@v3

      - name: Resolve bake subnet
        id: bake_subnet
        shell: bash
        run: |
          set -euo pipefail

          VPC_ID=$(aws ec2 describe-vpcs \
            --filters "Name=tag:Name,Values=khaleo-vpc" \
            --query "Vpcs[0].VpcId" \
            --output text)

          if [[ -z "${VPC_ID}" || "${VPC_ID}" == "None" ]]; then
            echo "Unable to resolve khaleo-vpc VPC ID." >&2
            exit 1
          fi

          SUBNET_ID=$(aws ec2 describe-subnets \
            --filters "Name=vpc-id,Values=${VPC_ID}" "Name=tag:Tier,Values=public" \
            --query "Subnets[0].SubnetId" \
            --output text)

          if [[ -z "${SUBNET_ID}" || "${SUBNET_ID}" == "None" ]]; then
            echo "Unable to resolve public subnet for AMI bake." >&2
            exit 1
          fi

          echo "vpc_id=${VPC_ID}" >> "$GITHUB_OUTPUT"
          echo "subnet_id=${SUBNET_ID}" >> "$GITHUB_OUTPUT"
          echo "Resolved AMI bake subnet: ${SUBNET_ID}"

      - name: Bake immutable backend AMI
        id: bake
        shell: bash
        run: |
          set -euo pipefail

          cd infra/packer
          packer init backend.pkr.hcl

          packer build -machine-readable -color=false \
            -var "aws_region=${AWS_REGION}" \
            -var "subnet_id=${{ steps.bake_subnet.outputs.subnet_id }}" \
            -var "app_jar_path=../../backend/target/flashcard-backend-0.1.0-SNAPSHOT.jar" \
            -var "db_secret_id=${DB_SECRET_ID}" \
            -var "jwt_secret_id=${JWT_SECRET_ID}" \
            -var "ses_secret_id=${SES_SECRET_ID}" \
            -var "runtime_env_path=${RUNTIME_ENV_PATH}" \
            -var "app_sha=${{ steps.sha.outputs.value }}" \
            backend.pkr.hcl | tee /tmp/packer-build.log

          AMI_ID=$(awk -F, '/artifact,0,id/ {print $6}' /tmp/packer-build.log | tail -n1 | cut -d: -f2)

          if [[ -z "${AMI_ID}" ]]; then
            echo "Unable to resolve baked AMI ID from Packer output." >&2
            exit 1
          fi

          echo "ami_id=${AMI_ID}" >> "$GITHUB_OUTPUT"
          echo "Baked immutable AMI: ${AMI_ID}"

      - name: Create launch template version with baked AMI
        id: launch_template
        shell: bash
        run: |
          set -euo pipefail

          LT_ID=$(aws autoscaling describe-auto-scaling-groups \
            --auto-scaling-group-names "${BACKEND_ASG_NAME}" \
            --query "AutoScalingGroups[0].LaunchTemplate.LaunchTemplateId" \
            --output text)

          CURRENT_VERSION=$(aws autoscaling describe-auto-scaling-groups \
            --auto-scaling-group-names "${BACKEND_ASG_NAME}" \
            --query "AutoScalingGroups[0].LaunchTemplate.Version" \
            --output text)

          if [[ -z "${LT_ID}" || "${LT_ID}" == "None" ]]; then
            echo "Unable to resolve launch template from ASG ${BACKEND_ASG_NAME}." >&2
            exit 1
          fi

          NEW_VERSION=$(aws ec2 create-launch-template-version \
            --launch-template-id "${LT_ID}" \
            --source-version "${CURRENT_VERSION}" \
            --launch-template-data "{\"ImageId\":\"${{ steps.bake.outputs.ami_id }}\"}" \
            --query "LaunchTemplateVersion.VersionNumber" \
            --output text)

          aws autoscaling update-auto-scaling-group \
            --auto-scaling-group-name "${BACKEND_ASG_NAME}" \
            --launch-template "LaunchTemplateId=${LT_ID},Version=${NEW_VERSION}"

          echo "launch_template_id=${LT_ID}" >> "$GITHUB_OUTPUT"
          echo "old_version=${CURRENT_VERSION}" >> "$GITHUB_OUTPUT"
          echo "new_version=${NEW_VERSION}" >> "$GITHUB_OUTPUT"

      - name: Ensure ASG refresh headroom
        id: refresh_prepare
        shell: bash
        run: |
          set -euo pipefail

          DESIRED=$(aws autoscaling describe-auto-scaling-groups \
            --auto-scaling-group-names "${BACKEND_ASG_NAME}" \
            --query "AutoScalingGroups[0].DesiredCapacity" \
            --output text)

          MAX_SIZE=$(aws autoscaling describe-auto-scaling-groups \
            --auto-scaling-group-names "${BACKEND_ASG_NAME}" \
            --query "AutoScalingGroups[0].MaxSize" \
            --output text)

          if [[ -z "${DESIRED}" || -z "${MAX_SIZE}" || "${DESIRED}" == "None" || "${MAX_SIZE}" == "None" ]]; then
            echo "Unable to resolve desired/max capacity for ${BACKEND_ASG_NAME}." >&2
            exit 1
          fi

          ORIGINAL_MAX="${MAX_SIZE}"
          ADJUSTED="false"

          if (( MAX_SIZE <= DESIRED )); then
            NEW_MAX=$((DESIRED + 1))
            aws autoscaling update-auto-scaling-group \
              --auto-scaling-group-name "${BACKEND_ASG_NAME}" \
              --max-size "${NEW_MAX}"
            MAX_SIZE="${NEW_MAX}"
            ADJUSTED="true"
            echo "Increased ASG max size to ${NEW_MAX} to preserve zero-downtime rollout headroom."
          fi

          echo "desired_capacity=${DESIRED}" >> "$GITHUB_OUTPUT"
          echo "original_max_size=${ORIGINAL_MAX}" >> "$GITHUB_OUTPUT"
          echo "effective_max_size=${MAX_SIZE}" >> "$GITHUB_OUTPUT"
          echo "max_size_adjusted=${ADJUSTED}" >> "$GITHUB_OUTPUT"

      - name: Start ASG instance refresh
        id: refresh
        shell: bash
        run: |
          set -euo pipefail
          REFRESH_ID=$(aws autoscaling start-instance-refresh \
            --auto-scaling-group-name "${BACKEND_ASG_NAME}" \
            --preferences '{"MinHealthyPercentage":100,"InstanceWarmup":180,"SkipMatching":true}' \
            --query "InstanceRefreshId" \
            --output text)
          echo "id=${REFRESH_ID}" >> "$GITHUB_OUTPUT"
          echo "Started instance refresh: ${REFRESH_ID}"

      - name: Wait for instance refresh completion
        id: refresh_wait
        shell: bash
        run: |
          set -euo pipefail

          REFRESH_ID="${{ steps.refresh.outputs.id }}"
          ATTEMPTS=0
          MAX_ATTEMPTS=60
          SLEEP_SECONDS=15

          while [[ ${ATTEMPTS} -lt ${MAX_ATTEMPTS} ]]; do
            STATUS=$(aws autoscaling describe-instance-refreshes \
              --auto-scaling-group-name "${BACKEND_ASG_NAME}" \
              --instance-refresh-ids "${REFRESH_ID}" \
              --query "InstanceRefreshes[0].Status" \
              --output text)

            if [[ "${STATUS}" == "Successful" ]]; then
              echo "final_status=${STATUS}" >> "$GITHUB_OUTPUT"
              exit 0
            fi

            if [[ "${STATUS}" == "Failed" || "${STATUS}" == "Cancelled" ]]; then
              echo "Instance refresh ended with status ${STATUS}." >&2
              echo "final_status=${STATUS}" >> "$GITHUB_OUTPUT"
              exit 1
            fi

            ATTEMPTS=$((ATTEMPTS + 1))
            sleep "${SLEEP_SECONDS}"
          done

          echo "Instance refresh timed out." >&2
          echo "final_status=Timeout" >> "$GITHUB_OUTPUT"
          exit 1

      - name: Restore ASG max size
        if: always() && steps.refresh_prepare.outputs.max_size_adjusted == 'true'
        shell: bash
        run: |
          set -euo pipefail
          aws autoscaling update-auto-scaling-group \
            --auto-scaling-group-name "${BACKEND_ASG_NAME}" \
            --max-size "${{ steps.refresh_prepare.outputs.original_max_size }}"
          echo "Restored ASG max size to ${{ steps.refresh_prepare.outputs.original_max_size }}"

      - name: Verify target group health convergence
        id: tg_health
        shell: bash
        run: |
          set -euo pipefail
          TARGET_GROUP_NAME="${DEPLOY_TARGET_GROUP_NAME:-khaleo-backend-tg}"

          TG_ARN=$(aws elbv2 describe-target-groups \
            --names "${TARGET_GROUP_NAME}" \
            --query "TargetGroups[0].TargetGroupArn" \
            --output text)

          if [[ -z "${TG_ARN}" || "${TG_ARN}" == "None" ]]; then
            echo "Unable to resolve target group ARN for ${TARGET_GROUP_NAME}." >&2
            exit 1
          fi

          ATTEMPTS=0
          MAX_ATTEMPTS=24
          SLEEP_SECONDS=10

          check_non_healthy() {
            local non_healthy=0
            local instance_ids

            instance_ids=$(aws autoscaling describe-auto-scaling-groups \
              --auto-scaling-group-names "${BACKEND_ASG_NAME}" \
              --query "AutoScalingGroups[0].Instances[?LifecycleState=='InService'].InstanceId" \
              --output text)

            for instance_id in ${instance_ids}; do
              state=$(aws elbv2 describe-target-health \
                --target-group-arn "${TG_ARN}" \
                --targets "Id=${instance_id}" \
                --query "TargetHealthDescriptions[0].TargetHealth.State" \
                --output text 2>/dev/null || echo "unknown")

              if [[ "${state}" != "healthy" ]]; then
                non_healthy=$((non_healthy + 1))
              fi
            done

            echo "${non_healthy}"
          }

          while [[ ${ATTEMPTS} -lt ${MAX_ATTEMPTS} ]]; do
            UNHEALTHY_COUNT=$(check_non_healthy)

            if [[ "${UNHEALTHY_COUNT}" == "0" ]]; then
              break
            fi

            ATTEMPTS=$((ATTEMPTS + 1))
            sleep "${SLEEP_SECONDS}"
          done

          TG_STATUS_TABLE=$(aws elbv2 describe-target-health \
            --target-group-arn "${TG_ARN}" \
            --query "TargetHealthDescriptions[].{instance:Target.Id,state:TargetHealth.State,reason:TargetHealth.Reason}" \
            --output table)

          echo "${TG_STATUS_TABLE}"

          FINAL_UNHEALTHY_COUNT=$(check_non_healthy)

          echo "non_healthy=${FINAL_UNHEALTHY_COUNT}" >> "$GITHUB_OUTPUT"
          echo "target_group_name=${TARGET_GROUP_NAME}" >> "$GITHUB_OUTPUT"
          echo "target_group_arn=${TG_ARN}" >> "$GITHUB_OUTPUT"

          if [[ "${FINAL_UNHEALTHY_COUNT}" != "0" ]]; then
            echo "Target group did not converge to healthy after immutable deploy." >&2
            exit 1
          fi

      - name: Publish deployment summary
        if: success()
        shell: bash
        run: |
          {
            echo "### Backend Deployment Summary (Immutable AMI)"
            echo "- Artifact SHA: ${{ steps.sha.outputs.value }}"
            echo "- Artifact URI: ${{ steps.upload.outputs.artifact_uri }}"
            echo "- AMI ID: ${{ steps.bake.outputs.ami_id }}"
            echo "- Launch template ID: ${{ steps.launch_template.outputs.launch_template_id }}"
            echo "- Launch template version: ${{ steps.launch_template.outputs.old_version }} -> ${{ steps.launch_template.outputs.new_version }}"
            echo "- Auto Scaling Group: ${BACKEND_ASG_NAME}"
            echo "- Instance refresh ID: ${{ steps.refresh.outputs.id }}"
            echo "- Instance refresh status: ${{ steps.refresh_wait.outputs.final_status }}"
            echo "- Desired capacity before refresh: ${{ steps.refresh_prepare.outputs.desired_capacity }}"
            echo "- ASG max size before refresh: ${{ steps.refresh_prepare.outputs.original_max_size }}"
            echo "- ASG max size adjusted: ${{ steps.refresh_prepare.outputs.max_size_adjusted }}"
            echo "- Target group: ${{ steps.tg_health.outputs.target_group_name }}"
            echo "- Target group ARN: ${{ steps.tg_health.outputs.target_group_arn }}"
            echo "- Non-healthy targets: ${{ steps.tg_health.outputs.non_healthy }}"
            echo "- Environment: production"
            echo ""
            echo "### Rollback Guidance"
            echo "- Re-run this workflow via workflow_dispatch with artifactSha=<known-good-sha>."
            echo "- If urgent, update ASG launch template to previous version ${{ steps.launch_template.outputs.old_version }} and start another instance refresh."
            echo "- Re-run Deploy Frontend with the same artifactSha to keep versions aligned."
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Manual rollback reminder
        if: failure()
        run: |
          {
            echo "### Manual Rollback"
            echo "- Re-run this workflow via workflow_dispatch with artifactSha=<known-good-sha> to bake and roll out a known-good AMI."
            echo "- Or revert ASG launch template to version ${{ steps.launch_template.outputs.old_version }} and trigger a new instance refresh."
            echo "- Re-run Deploy Frontend with the same artifactSha for consistency."
          } >> "$GITHUB_STEP_SUMMARY"
